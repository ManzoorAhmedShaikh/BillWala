<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BillWala — HESCO Bill Assistant</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D71920;--red-dark:#A81016;--yellow:#F5B800;--orange:#FF8C00;
  --slate:#1E2A3A;--slate-light:#2C3E50;--bg:#F7F5F0;--white:#fff;
  --text:#1a1a1a;--muted:#6B7280;--radius:14px;--shadow:0 8px 32px rgba(30,42,58,.12);
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}

#app{width:100%;max-width:720px;height:min(92vh,820px);background:var(--white);border-radius:20px;
  box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;position:relative}

  @supports (-webkit-touch-callout: none) {
  #app { height: -webkit-fill-available; }
}

/* ── Logo ── */
.logo-wrap{display:flex;flex-direction:column;align-items:center;transition:all .6s cubic-bezier(.4,0,.2,1)}
.logo-wrap.compact{padding:12px 0 4px;transform:translateY(0)}
.logo-wrap.compact .logo-svg{width:56px;height:56px}
.logo-wrap.compact .logo-text{font-size:1.1rem;margin-top:2px}
.logo-svg{width:110px;height:110px;transition:all .6s cubic-bezier(.4,0,.2,1);cursor:pointer}
.logo-svg:hover .ray{animation:rayPulse .6s ease}
.logo-text{font-size:2rem;font-weight:900;color:var(--red);letter-spacing:-1px;margin-top:6px;
  text-shadow:1px 1px 0 rgba(0,0,0,.15);transition:font-size .6s}
.logo-tag{font-size:.75rem;color:var(--muted);margin-top:2px;letter-spacing:.5px}

@keyframes rayPulse{0%,100%{opacity:1}50%{opacity:.5;transform:scaleY(1.15)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ── Phases ── */
.phase{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 28px;animation:fadeUp .4s ease}
.phase.hidden{display:none}

/* ── Landing form ── */
.toggle-group{display:flex;background:#EEE;border-radius:10px;padding:3px;margin:28px 0 16px;width:100%;max-width:380px}
.toggle-btn{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;font-size:.85rem;
  font-weight:600;color:var(--muted);cursor:pointer;transition:all .25s}
.toggle-btn.active{background:var(--white);color:var(--red);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.field-wrap{width:100%;max-width:380px;margin-bottom:20px}
.field-wrap label{display:block;font-size:.78rem;font-weight:600;color:var(--slate);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field-wrap input{width:100%;padding:14px 16px;border:2px solid #E5E7EB;border-radius:var(--radius);
  font-size:1rem;transition:border-color .2s;outline:none}
.field-wrap input:focus{border-color:var(--red)}
.field-wrap input:disabled{background:#F3F4F6;color:#9CA3AF;cursor:not-allowed}
.field-wrap.hidden{display:none}
.field-hint{display:none;font-size:.75rem;color:var(--red);margin-top:5px;}
.field-hint.visible{display:block;}
.or-divider{font-size:.75rem;color:var(--muted);margin:-8px 0 12px;align-self:center}
.submit-btn{width:100%;max-width:380px;padding:15px;background:linear-gradient(135deg,var(--red),var(--red-dark));
  color:var(--white);border:none;border-radius:var(--radius);font-size:1rem;font-weight:700;cursor:pointer;
  transition:transform .15s,box-shadow .15s;letter-spacing:.3px}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(215,25,32,.35)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* ── Loading ── */
.loading-body{width:100%;max-width:400px;margin-top:24px;display:flex;flex-direction:column;align-items:center;}
.loading-step{width:100%;max-width:300px;}
.loading-step{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:.9rem;color:var(--muted);
  opacity:.35;transition:all .4s}
.loading-step.active{color:var(--slate);opacity:1;font-weight:600}
.loading-step.done{color:#16A34A;opacity:1}
.step-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-icon .spinner{width:18px;height:18px;border:2.5px solid #E5E7EB;border-top-color:var(--red);
  border-radius:50%;animation:spin .7s linear infinite;display:none}
.loading-step.active .spinner{display:block}
.loading-step.done .spinner{display:none}
.loading-step.done .check{display:block;color:#16A34A;font-weight:700}
.loading-step.failed{color:#D71920;opacity:1}
.loading-step.failed .spinner{display:none}
.loading-step.failed .cross{display:block;color:#D71920;font-weight:700}
.cross{display:none}
.check{display:none}
.progress-bar{width:100%;height:4px;background:#E5E7EB;border-radius:2px;margin-top:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--red));width:0%;transition:width .5s ease}

/* ── Error ── */
.error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--radius);padding:16px 20px;
  max-width:380px;text-align:center;margin-top:16px}
.error-box p{color:var(--red-dark);font-size:.9rem;margin-bottom:12px}
.hidden{display:none!important}
.retry-btn{padding:10px 24px;background:var(--slate);color:var(--white);border:none;border-radius:8px;
  font-weight:600;cursor:pointer}

/* ── Chat ── */
#chat.phase{padding:0;justify-content:flex-start;height:100%;}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;width:100%;min-height:0;}
.chat-header{width:100%;padding:8px 20px 0;border-bottom:1px solid #F0F0F0;background:var(--white);
  flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;width:100%}
.msg{max-width:85%;animation:fadeUp .3s ease}
.msg.user{align-self:flex-end;background:var(--slate);color:var(--white);padding:12px 16px;
  border-radius:18px 18px 4px 18px;font-size:.92rem;line-height:1.5}
.msg.assistant{align-self:flex-start;background:#F3F4F6;padding:12px 16px;
  border-radius:18px 18px 18px 4px;font-size:.92rem;line-height:1.6;color:var(--text)}
.msg.thinking{align-self:flex-start;display:flex;align-items:center;gap:8px;padding:12px 16px;
  background:#F3F4F6;border-radius:18px;font-size:.85rem;color:var(--muted)}
.thinking-dots span{display:inline-block;width:6px;height:6px;background:var(--muted);border-radius:50%;
  margin:0 2px;animation:blink 1.4s infinite}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
.thinking-label{font-style:italic}

.suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 12px;width:100%}
.chip{padding:8px 14px;background:linear-gradient(135deg,#FFF8E7,#FFF3D0);border:1px solid #F5DEB3;
  border-radius:20px;font-size:.8rem;color:var(--slate);cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:hover{background:var(--yellow);border-color:var(--orange);color:var(--slate);transform:translateY(-1px)}

.chat-input-wrap{display:flex;gap:10px;padding:14px 20px;border-top:1px solid #F0F0F0;background:var(--white);width:100%}
.chat-input-wrap input{flex:1;padding:12px 16px;border:2px solid #E5E7EB;border-radius:var(--radius);
  font-size:.92rem;outline:none;transition:border-color .2s}
.chat-input-wrap input:focus{border-color:var(--red)}
.send-btn{width:44px;height:44px;background:var(--red);border:none;border-radius:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.send-btn:hover{background:var(--red-dark)}
.send-btn svg{fill:var(--white)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>
<div id="app">

  <!-- Landing -->
  <div id="landing" class="phase">
    <div class="logo-wrap" id="logo-landing">
      <svg class="logo-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sunGrad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#F5B800"/>
          </linearGradient>
        </defs>
        <g transform="translate(60,38)">
          <path d="M0,18 A18,18 0 0,1 0,-18 A18,18 0 0,1 0,18" fill="url(#sunGrad)"/>
          <line class="ray" x1="0" y1="-22" x2="0" y2="-36" stroke="#F5B800" stroke-width="3" stroke-linecap="round"/>
          <line class="ray" x1="15.6" y1="-15.6" x2="27" y2="-27" stroke="#FFB020" stroke-width="2.5" stroke-linecap="round"/>
          <line class="ray" x1="22" y1="0" x2="36" y2="0" stroke="#F5B800" stroke-width="3" stroke-linecap="round"/>
          <line class="ray" x1="15.6" y1="15.6" x2="27" y2="27" stroke="#FFB020" stroke-width="2.5" stroke-linecap="round"/>
          <line class="ray" x1="-15.6" y1="-15.6" x2="-27" y2="-27" stroke="#FFB020" stroke-width="2.5" stroke-linecap="round"/>
          <line class="ray" x1="-22" y1="0" x2="-36" y2="0" stroke="#F5B800" stroke-width="3" stroke-linecap="round"/>
          <line class="ray" x1="-15.6" y1="15.6" x2="-27" y2="27" stroke="#FFB020" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <text x="60" y="98" text-anchor="middle" font-family="Segoe UI,sans-serif" font-weight="900"
          font-size="22" fill="#D71920" stroke="#1a1a1a" stroke-width=".3">BillWala</text>
      </svg>
      <div class="logo-tag">Your HESCO Bill, Simplified</div>
    </div>

    <div class="toggle-group">
      <button class="toggle-btn active" data-mode="consumer" onclick="setMode('consumer')">Consumer ID</button>
      <button class="toggle-btn" data-mode="reference" onclick="setMode('reference')">Reference No</button>
    </div>

    <div class="field-wrap" id="field-consumer">
      <label>Consumer ID</label>
      <input type="text" id="consumer-id" placeholder="e.g. 12345678901" inputmode="numeric" autocomplete="off" maxlength="10">
      <span class="field-hint" id="hint-consumer">CustomerID must be exactly of 10 digits</span>
    </div>
    <div class="field-wrap hidden" id="field-reference">
      <label>Reference Number</label>
      <input type="text" id="reference-no" placeholder="e.g. 04 12345 6789012" autocomplete="off" maxlength="14">
      <span class="field-hint" id="hint-reference">ReferenceNo must be exactly 14 characters</span>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitBill()">Fetch My Bill</button>
  </div>

  <!-- Loading -->
  <div id="loading" class="phase hidden">
    <div class="logo-wrap" id="logo-loading">
      <svg class="logo-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="sunGrad2" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#F5B800"/>
        </linearGradient></defs>
        <g transform="translate(60,38)">
          <path d="M0,18 A18,18 0 0,1 0,-18 A18,18 0 0,1 0,18" fill="url(#sunGrad2)"/>
          <line class="ray" x1="0" y1="-22" x2="0" y2="-36" stroke="#F5B800" stroke-width="3" stroke-linecap="round"/>
          <line class="ray" x1="15.6" y1="-15.6" x2="27" y2="-27" stroke="#FFB020" stroke-width="2.5" stroke-linecap="round"/>
          <line class="ray" x1="22" y1="0" x2="36" y2="0" stroke="#F5B800" stroke-width="3" stroke-linecap="round"/>
          <line class="ray" x1="-15.6" y1="-15.6" x2="-27" y2="-27" stroke="#FFB020" stroke-width="2.5" stroke-linecap="round"/>
          <line class="ray" x1="-22" y1="0" x2="-36" y2="0" stroke="#F5B800" stroke-width="3" stroke-linecap="round"/>
        </g>
        <text x="60" y="98" text-anchor="middle" font-family="Segoe UI,sans-serif" font-weight="900"
          font-size="22" fill="#D71920" stroke="#1a1a1a" stroke-width=".3">BillWala</text>
      </svg>
    </div>
    <div class="loading-body" id="loading-steps"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="error-box hidden" id="error-box">
      <p id="error-msg"></p>
      <button class="retry-btn" onclick="retryFetch()">Try Again</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat" class="phase hidden">
    <div class="chat-header" style="flex-direction:row;justify-content:space-between;align-items:center;padding:10px 20px;">
      <div style="width:80px;"></div>
      <div class="logo-wrap compact" id="logo-chat">
        <svg class="logo-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="sunGrad3" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#F5B800"/>
          </linearGradient></defs>
          <g transform="translate(60,38)">
            <path d="M0,18 A18,18 0 0,1 0,-18 A18,18 0 0,1 0,18" fill="url(#sunGrad3)"/>
            <line x1="0" y1="-22" x2="0" y2="-36" stroke="#F5B800" stroke-width="3" stroke-linecap="round"/>
            <line x1="22" y1="0" x2="36" y2="0" stroke="#F5B800" stroke-width="3" stroke-linecap="round"/>
            <line x1="-22" y1="0" x2="-36" y2="0" stroke="#F5B800" stroke-width="3" stroke-linecap="round"/>
          </g>
          <text x="60" y="98" text-anchor="middle" font-family="Segoe UI,sans-serif" font-weight="900"
            font-size="22" fill="#D71920" stroke="#1a1a1a" stroke-width=".3">BillWala</text>
        </svg>
      </div>
      <button onclick="newBill()" style="width:80px;padding:7px 10px;font-size:.75rem;font-weight:600;
        color:var(--red);background:none;border:1.5px solid var(--red);border-radius:8px;cursor:pointer;">
        + New Bill
      </button>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="suggestions" id="suggestions"></div>
    <div class="chat-input-wrap">
      <input type="text" id="chat-input" placeholder="Ask about your bill..." autocomplete="off"
        onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const API = { fetchBill: '/api/fetch-bill', chat: '/api/chat' };
const FETCH_STEPS = [
  'Connecting to bill portal…',
  'Validating your credentials…',
  'Searching bill records…',
  'Calling fetch_hesco_bill [Tool call]…',
  'Reading bill data…',
  'Preparing your assistant…'
];
const THINK_STEPS = ['Reading your question…', 'Analyzing bill data…', 'Thinking…'];
const PRESETS = [
  'Mera bill kitna hai?',
  'What are the arrears on my bill?',
  'Explain the FPA charge',
  'When is my due date?',
  'Compare my last 3 months usage'
];

let mode = 'consumer', threadId = null, billData = null, fetching = false;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  document.getElementById('field-consumer').classList.toggle('hidden', m !== 'consumer');
  document.getElementById('field-reference').classList.toggle('hidden', m !== 'reference');
  if (m === 'consumer') document.getElementById('reference-no').value = '';
  else document.getElementById('consumer-id').value = '';
}

function showPhase(id) {
  ['landing', 'loading', 'chat'].forEach(p => document.getElementById(p).classList.toggle('hidden', p !== id));
}

function buildSteps(container, steps) {
  container.innerHTML = steps.map((s, i) => `
    <div class="loading-step" data-step="${i}">
      <div class="step-icon"><div class="spinner"></div><span class="check">✓</span><span class="cross">✗</span></div>
      <span>${s}</span>
    </div>`).join('');
}

async function animateSteps(container, steps, duration, abort) {
  buildSteps(container, steps);
  const els = container.querySelectorAll('.loading-step');
  const perStep = duration / steps.length;

  for (let i = 0; i < steps.length; i++) {
    els.forEach((el, j) => {
      el.classList.toggle('active', j === i);
      el.classList.toggle('done', j < i);
    });
    document.getElementById('progress-fill').style.width = ((i + 1) / steps.length * 100) + '%';

    await sleep(perStep);

    // Stop exactly at the designated failure step
    if (abort && abort.aborted && i >= (abort.failAtStep ?? i)) {
      els[i].classList.remove('active');
      els[i].classList.add('failed');
      document.getElementById('progress-fill').style.background = '#D71920';
      return;
    }
  }
  els.forEach(el => { el.classList.remove('active'); el.classList.add('done'); });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function submitBill() {
  if (fetching) return;
  const consumerId = document.getElementById('consumer-id').value.trim();
  const referenceNo = document.getElementById('reference-no').value.trim();
  const value = mode === 'consumer' ? consumerId : referenceNo;

  document.getElementById('hint-consumer').classList.remove('visible');
  document.getElementById('hint-reference').classList.remove('visible');

  const minLen = mode === 'consumer' ? 10 : 14;
  const inputEl = document.getElementById(mode === 'consumer' ? 'consumer-id' : 'reference-no');
  const hintEl = document.getElementById(mode === 'consumer' ? 'hint-consumer' : 'hint-reference');

  if (!value || value.length < minLen) {
      inputEl.style.borderColor = 'var(--red)';
      hintEl.classList.add('visible');
      inputEl.focus();
      setTimeout(() => {
          inputEl.style.borderColor = '';
          hintEl.classList.remove('visible');
      }, 3000);
      return;
  }

  fetching = true;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('error-box').classList.add('hidden');
  showPhase('loading');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-fill').style.background = 'linear-gradient(90deg,var(--yellow),var(--red))';

  const stepsEl = document.getElementById('loading-steps');
  const abort = { aborted: false };
  const animPromise = animateSteps(stepsEl, FETCH_STEPS, 4000, abort);

  const body = mode === 'consumer' ? { consumer_id: consumerId, reference_no: '' }
                                   : { consumer_id: '', reference_no: referenceNo };

  try {
    const res = await fetch(API.fetchBill, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    const data = await res.json();

    if (data.status !== 0 || !data.data || isBillError(data.data)) {
    abort.aborted = true;
    abort.failAtStep = 3;   // ← always fail at "Calling fetch_hesco_bill" step
    await animPromise;
    showFetchError(statusMessage(data.status, data.data));
    return;
    }

    await animPromise;            // ← let all checks pass normally
    billData = data.data;
    threadId = data.thread_id || null;
    enterChat();
    } catch (e) {
    abort.aborted = true;
    abort.failAtStep = 0;   // ← fail at "Connecting to bill portal"
    await animPromise;
    showFetchError('Could not reach the server. Make sure the backend is running.');
    } finally {
    fetching = false;
    document.getElementById('submit-btn').disabled = false;
  }
}

function isBillError(text) {
  return typeof text === 'string' && text.startsWith('BILL NOT');
}

function statusMessage(status, data) {
  const map = { 1: 'Bill not found. Please check your CustomerID or RefNo and try again.',
    2: 'Server timed out. Please try again in a moment.', 3: 'An unexpected error occurred. Please try again.' };
  return map[status] || (isBillError(data) ? data : 'Failed to fetch bill.');
}

function showFetchError(msg) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-box').classList.remove('hidden');
}

function retryFetch() {
  document.getElementById('error-box').classList.add('hidden');
  showPhase('landing');
}

function enterChat() {
  showPhase('chat');
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  addAssistantMsg('Your bill has been loaded! Ask me anything about your HESCO electricity bill — in English or Roman Urdu.');
  renderPresets();
}

function renderPresets() {
  const el = document.getElementById('suggestions');
  el.innerHTML = PRESETS.map(q => `<button class="chip" onclick="askPreset(this)">${q}</button>`).join('');
}

function askPreset(btn) {
  document.getElementById('chat-input').value = btn.textContent;
  sendMessage();
}

function addUserMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  document.getElementById('messages').appendChild(d);
  scrollChat();
}

function addAssistantMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg assistant';
  d.innerHTML = formatMarkdown(text);
  document.getElementById('messages').appendChild(d);
  scrollChat();
}

function formatMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h4 style="margin:8px 0 4px;font-size:.9rem;">$1</h4>')
    .replace(/^## (.+)$/gm, '<h3 style="margin:10px 0 4px;">$1</h3>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul style="margin:6px 0 6px 16px;display:flex;flex-direction:column;gap:4px;">$1</ul>')
    .replace(/\n\n/g, '</p><p style="margin-top:8px;">')
    .replace(/\n/g, '<br>');
}

function addThinking(label) {
  const d = document.createElement('div');
  d.className = 'msg thinking';
  d.id = 'thinking-indicator';
  d.innerHTML = `<span class="thinking-label">${label}</span><span class="thinking-dots"><span></span><span></span><span></span></span>`;
  document.getElementById('messages').appendChild(d);
  scrollChat();
  return d;
}

function removeThinking() {
  const el = document.getElementById('thinking-indicator');
  if (el) el.remove();
}

function scrollChat() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('suggestions').innerHTML = '';
  addUserMsg(text);

  let stepIdx = 0;
  const thinkEl = addThinking(THINK_STEPS[0]);
  const stepTimer = setInterval(() => {
    stepIdx = (stepIdx + 1) % THINK_STEPS.length;
    thinkEl.querySelector('.thinking-label').textContent = THINK_STEPS[stepIdx];
  }, 1800);

  try {
    const res = await fetch(API.chat, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, thread_id: threadId })
    });
    const data = await res.json();
    clearInterval(stepTimer);
    removeThinking();
    if (data.thread_id) threadId = data.thread_id;
    addAssistantMsg(data.reply || 'Sorry, I could not generate a response.');
  } catch (e) {
    clearInterval(stepTimer);
    removeThinking();
    addAssistantMsg('Could not reach the server. Please try again.');
  }
  document.getElementById('send-btn').disabled = false;
  scrollChat();
}

function newBill() {
  threadId = null;
  billData = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('suggestions').innerHTML = '';
  document.getElementById('consumer-id').value = '';
  document.getElementById('reference-no').value = '';
  document.getElementById('error-box').classList.add('hidden');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-fill').style.background = 'linear-gradient(90deg,var(--yellow),var(--red))';
  showPhase('landing');
}
</script>
